# Airflow local (Windows) — UI http://localhost:8081  (admin / admin)
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.5-python3.10
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: bce_tp_fernet_key_32bytes_min!!
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/ingestion_bronze/dags
      AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: "true"
      PYTHONPATH: /opt/airflow/ingestion_bronze
      _PIP_ADDITIONAL_REQUIREMENTS: pandas pyarrow pymongo pyyaml requests
      # Acces MongoDB + KBO depuis le conteneur (Windows Docker Desktop)
      BCE_MONGODB_URI: mongodb://host.docker.internal:27017
      BCE_KBO_SOURCE_DIR: /opt/airflow/kbo_data
      BCE_DEMO_LIMIT_ENTERPRISES: "5000"
    volumes: &airflow-volumes
      - .:/opt/airflow/ingestion_bronze
      - ../KboOpenData_0404_2026_06_28_Full:/opt/airflow/kbo_data:ro
      - airflow-logs:/opt/airflow/logs
    extra_hosts: &airflow-hosts
      - "host.docker.internal:host-gateway"
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs
        chown -R 50000:0 /opt/airflow/logs
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    extra_hosts: *airflow-hosts
    user: "50000:0"
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    extra_hosts: *airflow-hosts
    user: "50000:0"
    command: scheduler
    restart: unless-stopped

  # Obligatoire Airflow 2.4+ : synchronise les DAGs fichiers -> base metadata (sinon UI vide)
  airflow-dag-processor:
    image: apache/airflow:2.10.5-python3.10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    extra_hosts: *airflow-hosts
    user: "50000:0"
    command: dag-processor
    restart: unless-stopped

volumes:
  airflow-postgres:
  airflow-logs:
